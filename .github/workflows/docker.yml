name: Project Docker Hub Image

on:
  workflow_call:

jobs:
  order-docker:
    name: ms-orders Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set Docker Build
      uses: docker/setup-buildx-action@v3.12.0
    - name: Docker login
      uses: docker/login-action@v4.0.0
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWD }}
    - name: Docker push backend
      uses: docker/build-push-action@v6.19.2
      with:
        file: ./ms-orders/Dockerfile
        context: ./ms-orders
        push: true
        tags: leoalmeida/ms-orders:${{github.run_number}}
    
  customer-docker:
    name: ms-customer Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set Docker Build
      uses: docker/setup-buildx-action@v3.12.0
    - name: Docker login
      uses: docker/login-action@v4.0.0
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWD }}
    - name: Docker push ms-customers
      uses: docker/build-push-action@v6.19.2
      with:
        file: ./ms-customers/Dockerfile
        context: ./ms-customers
        push: true
        tags: leoalmeida/ms-customers:${{github.run_number}}
