<mat-card
  [class]="{ created: customer().ativo, closed: !customer().ativo }"
  class="card-button"
  appearance="outlined"
  (click)="onUpdateCustomer()"
>
  <mat-card-title class="title">
    <div
      class="badge-status"
      [matBadge]="customer().ativo ? 'Ativo' : 'Cancelado'"
      matBadgeSize="large"
      [matBadgeColor]="customer().ativo ? 'primary' : 'accent'"
    ></div>
    {{ customer().name }}
  </mat-card-title>
  <mat-card-content class="description">
    <h2>
      {{ customer().email }}
    </h2>
  </mat-card-content>
  <mat-card-subtitle class="category">
    Telefone:
    {{
      customer().phone
    }}</mat-card-subtitle
  >
  <mat-divider></mat-divider>
  <mat-card-actions class="actionbar" align="end">
    <button mat-icon-button (click)="onRemoveCustomer($event, confirmDialog)">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>

<ng-template #confirmDialog let-message>
  <h1 mat-dialog-title>Confirma?</h1>
  <div mat-dialog-content>
    <p class="dialog-message">{{ message.message }}</p>
  </div>
  <div mat-dialog-actions>
    <button matButton [mat-dialog-close]="false">Cancelar</button>
    <button matButton="filled" color="primary" [mat-dialog-close]="true">
      Confirmar
    </button>
  </div>
</ng-template>
