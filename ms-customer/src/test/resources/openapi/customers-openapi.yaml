openapi: 3.0.3
info:
  title: ms-customer API
  version: 0.0.1

paths:
  /api/v1/customer:
    get:
      operationId: getAllCustomers
      summary: Lista todos os clientes
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerDto'
    post:
      operationId: createCustomer
      summary: Cria um novo cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
      responses:
        '202':
          description: Accepted
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/customer/{id}:
    get:
      operationId: getCustomerById
      summary: Busca cliente por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessError'
    put:
      operationId: updateCustomer
      summary: Atualiza um cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
        '422':
          $ref: '#/components/responses/BusinessError'
    delete:
      operationId: deleteCustomer
      summary: Remove um cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '202':
          description: Accepted

  /api/v1/customer/{id}/orders:
    get:
      operationId: getCustomerOrders
      summary: Lista pedidos do cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDto'

  /api/v1/customer/{id}/exists:
    get:
      operationId: checkCustomerExists
      summary: Verifica se cliente existe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: boolean

  /api/v1/customer/email/{email}:
    get:
      operationId: getCustomerByEmail
      summary: Busca cliente por email
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
        '404':
          description: Not Found

  /api/v1/customer/search:
    get:
      operationId: searchCustomersByName
      summary: Pesquisa clientes por nome
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerDto'

  /api/v1/customer/validate-email:
    post:
      operationId: validateEmail
      summary: Valida formato de email
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK - email válido
          content:
            application/json:
              schema:
                type: boolean
        '400':
          description: Bad Request - email inválido
          content:
            application/json:
              schema:
                type: boolean

components:
  schemas:
    CustomerDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        email:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        orderList:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/OrderDto'

    OrderDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        customerId:
          type: integer
          format: int64
          nullable: true
        totalPrice:
          type: number
          nullable: true
        itemList:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/OrderItemDto'

    OrderItemDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        orderId:
          type: integer
          format: int64
          nullable: true
        productName:
          type: string
          nullable: true
        quantity:
          type: integer
          nullable: true
        price:
          type: number
          nullable: true

    ResponseError:
      type: object
      properties:
        timestamp:
          oneOf:
            - type: string
            - type: integer
        status:
          type: string
        statusCode:
          type: integer
        error:
          type: string

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResponseError'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResponseError'
    BusinessError:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResponseError'
